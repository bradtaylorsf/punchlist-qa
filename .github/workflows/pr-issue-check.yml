name: PR Issue Reference Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-issue-reference:
    name: Verify PR references GitHub issues
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for issue references
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const title = context.payload.pull_request.title || '';

            // Match patterns: closes #N, fixes #N, resolves #N (case-insensitive)
            const closingPattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(closingPattern)];

            // Also check for issue refs in title like "feat: description (#123)"
            const titlePattern = /\(#(\d+)\)/g;
            const titleMatches = [...title.matchAll(titlePattern)];

            const allRefs = [...matches, ...titleMatches];

            if (allRefs.length === 0) {
              core.setFailed(
                `❌ PR must reference at least one GitHub issue.\n\n` +
                `Add "closes #N" to the PR body for each issue this PR completes.\n` +
                `Example: "closes #14, closes #15"\n\n` +
                `This ensures issues are automatically linked to the PR for traceability.`
              );
              return;
            }

            const issueNumbers = allRefs.map(m => m[1]);
            core.info(`✅ PR references issues: ${[...new Set(issueNumbers)].map(n => '#' + n).join(', ')}`);
