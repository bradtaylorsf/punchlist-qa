name: Issue Close Protection

on:
  issues:
    types: [closed]

jobs:
  verify-linked-pr:
    name: Verify issue was closed by a PR
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue was closed via PR merge
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // Get timeline events for this issue to find closing references
            const events = await github.rest.issues.listEventsForTimeline({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            // Look for a "closed" event that references a commit or PR
            const closeEvent = events.data.find(
              e => e.event === 'closed' && (e.commit_id || e.source)
            );

            // Also check if any merged PR references this issue
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 20,
            });

            const closingPattern = new RegExp(
              `(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issue.number}\\b`,
              'i'
            );

            const linkedPR = pulls.data.find(
              pr => pr.merged_at && pr.body && closingPattern.test(pr.body)
            );

            if (!closeEvent && !linkedPR) {
              // Reopen the issue and add a comment
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'open',
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '⚠️ **Issue reopened automatically.**',
                  '',
                  'Issues must be closed by a PR (using `closes #' + issue.number + '` in the PR body), not manually.',
                  '',
                  'This ensures every issue is linked to the code change that resolved it.',
                  'See [AGENTS.md](../blob/main/AGENTS.md#issue-lifecycle) for the full workflow.',
                ].join('\n'),
              });

              core.warning(
                `Issue #${issue.number} was closed without a linked PR. It has been reopened.`
              );
            } else {
              const via = linkedPR
                ? `PR #${linkedPR.number}`
                : `commit ${closeEvent?.commit_id?.slice(0, 7)}`;
              core.info(`✅ Issue #${issue.number} was properly closed via ${via}`);
            }
