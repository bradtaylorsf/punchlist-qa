services:
  punchlist:
    build: .
    ports:
      - '4747:4747'
    volumes:
      - punchlist-data:/data/.punchlist
      - ./punchlist.config.json:/app/punchlist.config.json:ro
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=4747
      - PUNCHLIST_DATA_DIR=/data/.punchlist
    restart: unless-stopped

volumes:
  punchlist-data:
